<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Dog Yums</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
              integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
              crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.6.1/font/bootstrap-icons.css">
        <link rel="stylesheet" href="./styles/styles.css">
    </head>
    <body>
        <nav class="navbar navbar-expand-sm navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">Dog Yums</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbar-links">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbar-links">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./items.html">Items</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./contact.html">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main>
            <section>
                <div class="container">
                    <div class="row d-flex flex-column align-items-center">
                        <div class="col-md-6">
                            <h1>Contact</h1>
                            <p class="lead">Have a question? Fill out our form below</p>
                        </div>
                        <div class="col-md-6">
                            <form>
                                <div class="form-group">
                                    <label for="name">Name</label>
                                    <i data-bs-toggle="tooltip" data-bs-placement="top"
                                       title="Enter your name below"
                                       class="mx-1 bi bi-question-circle-fill"></i>
                                    <input type="text" class="form-control" id="name"
                                           placeholder="John Doe">
                                </div>
                                <div class="form-group mt-1">
                                    <label for="email">Email</label>
                                    <i data-bs-toggle="tooltip" data-bs-placement="top"
                                       title="Enter your email below"
                                       class="mx-1 bi bi-question-circle-fill"></i>
                                    <input type="email" class="form-control" id="email"
                                           placeholder="john.doe@example.com">
                                </div>
                                <div class="form-group mt-1">
                                    <label for="phone">Phone</label>
                                    <i data-bs-toggle="tooltip" data-bs-placement="top"
                                       title="Enter your phone number below"
                                       class="mx-1 bi bi-question-circle-fill"></i>
                                    <input type="tel" class="form-control" id="phone"
                                           placeholder="(xxx)-xxx-xxxx">
                                </div>
                                <div class="form-group mt-1">
                                    <label for="message">Message</label>
                                    <i data-bs-toggle="tooltip" data-bs-placement="top"
                                       title="Enter your message or question below"
                                       class="mx-1 bi bi-question-circle-fill"></i>
                                    <textarea class="form-control" id="message" rows="3"
                                              placeholder="Message"></textarea>
                                </div>
                                <button type="submit" class="mt-1 btn cus-btn btn-primary">Submit</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="fixed-bottom text-center text-dark p-2 bg-dark">
            <div class="container">
                <p class="text-light">Dog Yums</p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
                integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
                crossorigin="anonymous"></script>

        <script>
            // Bootstrap Tooltips
            const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            tooltipTriggerList.forEach(function (tooltipTriggerEl) {
                new bootstrap.Tooltip(tooltipTriggerEl)
            });
        </script>
    </body>
</html>
